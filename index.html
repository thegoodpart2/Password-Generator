<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Password Generator</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
    <label for="length">Length:</label>
    <input type="number" id="length" min="8" value="8"><br>

    <input type="checkbox" id="upper"> Include Uppercase<br>
    <input type="checkbox" id="lower"> Include Lowercase<br>
    <input type="checkbox" id="number"> Include Numbers<br>
    <input type="checkbox" id="symbol"> Include Symbols<br>

    <button id="generateButton">Generate Password</button><br>
    <input type="text" id="password" readonly><br>

    <script src="script.js"></script>
</body>
</html>
